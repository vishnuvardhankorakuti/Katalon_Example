name: Katalon Test Execution

on:
  push:
    branches:
      - master
  schedule:
    - cron: '30 12 * * *'   # Daily at 6:00 PM IST
  workflow_dispatch:

jobs:
  katalon-tests:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clear old Katalon Reports
        shell: powershell
        run: |
          if (Test-Path Reports) {
            Remove-Item Reports -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path Reports
          

      - name: Cache Katalon Runtime Engine
        uses: actions/cache@v4
        with:
          path: katalon
          key: katalon-engine-10.0.0-windows


      - name: Download Katalon Runtime Engine
        if: steps.cache-katalon.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://download.katalon.com/10.0.0/Katalon_Studio_Engine_Windows_64-10.0.0.zip" `
            -OutFile katalon.zip
          Expand-Archive katalon.zip -DestinationPath katalon


      - name: Run Katalon Tests
        shell: powershell
        env:
          KATALON_API_KEY: ${{ secrets.KATALON_API_KEY }}
        run: |
          Write-Host "Searching for katalonc.exe..."
          $katalonExe = Get-ChildItem -Recurse -Filter "katalonc.exe" | Select-Object -First 1



          Write-Host "Found Katalon at $($katalonExe.FullName)"

          & $katalonExe.FullName `
            -noSplash `
            -runMode=console `
            -projectPath="$env:GITHUB_WORKSPACE" `
            -testSuitePath="Test Suites/TS1" `
            -executionProfile="default" `
            -browserType="Chrome" `
            -apiKey="$env:KATALON_API_KEY"
            --config -webui.autoUpdateDrivers=true



      - name: Upload Katalon Reports
        uses: actions/upload-artifact@v4
        with:
          name: katalon-test-reports
          path: Reports/

      - name: Send Email with Test Report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Katalon Test Execution Report"
          body: |
            Hi,

            The Katalon test execution has completed.
            Please find the attached report.

            Regards,
            GitHub Actions
          to: ${{ secrets.MAIL_TO }}
          from: GitHub Actions <${{ secrets.SMTP_USERNAME }}>
          attachments: Reports/**/*.html
