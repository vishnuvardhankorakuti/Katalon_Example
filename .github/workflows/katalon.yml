name: Katalon Test Execution

on:
  push:
    branches:
      - master
  schedule:
    - cron: '10 11 * * *'   # 4:40 PM IST
  workflow_dispatch:

jobs:
  katalon-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Katalon Tests using Docker
        env:
          KATALON_API_KEY: ${{ secrets.KATALON_API_KEY }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/katalon/project" \
            katalonstudio/katalon:10.0.0 \
            katalonc.sh \
            -noSplash \
            -runMode=console \
            -projectPath=/katalon/project \
            -testSuitePath="Test Suites/TS1" \
            -executionProfile="default" \
            -browserType="Chrome" \
            -apiKey="$KATALON_API_KEY"